name: 그자출

# 그룹웨어 자동 출근 (평일 07:00 기상 → 08:45~08:55 랜덤 출근, 공휴일 제외)
on:
  # cron 은 UTC 기준. GitHub 스케줄러 지연을 넉넉히 흡수하려 "07:00(KST)"에 깨운다.
  # 실제 클릭 시각은 아래 랜덤 지연 스텝이 08:45~08:55 사이로 맞춘다(마감 09:00:00 전).
  # KST 07:00 = UTC(전날) 22:00 → 평일(월~금, KST)은 UTC 기준 일~목 = 0-4
  schedule:
    - cron: '0 22 * * 0-4'
  # 수동 실행 버튼 + 드롭다운(select) 옵션
  workflow_dispatch:
    inputs:
      dry_run:
        description: '실제 클릭 없이 테스트만 (dry-run)'
        type: boolean
        default: false

jobs:
  # 오늘이 공휴일(대체공휴일 포함)이면 출근 잡을 스킵한다.
  check:
    runs-on: ubuntu-latest
    outputs:
      is_holiday: ${{ steps.holiday.outputs.is_holiday }}
    steps:
      - name: 공휴일 체크 (KST 기준)
        id: holiday
        env:
          # 2026 대한민국 공휴일 + 대체공휴일. 날짜만 추가/삭제하면 됨. (평일만 의미 있음)
          HOLIDAYS: >-
            2026-01-01
            2026-02-16 2026-02-17 2026-02-18
            2026-03-02
            2026-05-05 2026-05-25
            2026-08-17
            2026-09-24 2026-09-25 2026-09-28
            2026-10-05 2026-10-09
            2026-12-25
        run: |
          TODAY=$(TZ=Asia/Seoul date +%Y-%m-%d)
          if echo " $HOLIDAYS " | grep -q " $TODAY "; then
            echo "오늘($TODAY)은 공휴일 → 출근 스킵"
            echo "is_holiday=true" >> "$GITHUB_OUTPUT"
          else
            echo "오늘($TODAY)은 근무일 → 진행"
            echo "is_holiday=false" >> "$GITHUB_OUTPUT"
          fi

  attend:
    needs: check
    # 공휴일이면 스킵. 단 수동 실행(테스트)은 공휴일이어도 진행.
    if: needs.check.outputs.is_holiday != 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        run: npm install

      - name: Playwright 브라우저 설치
        run: npx playwright install --with-deps chromium

      # 스케줄 실행에만 랜덤 지연 적용 (수동 실행은 즉시)
      # 핵심 안전장치: WINDOW_END(마감) 를 절대 넘겨서 대기하지 않는다.
      - name: 랜덤 지연 (마감 전까지만 대기)
        if: github.event_name == 'schedule'
        env:
          WINDOW_START: ${{ vars.GW_WINDOW_START || '08:45' }}
          WINDOW_END: ${{ vars.GW_WINDOW_END || '08:55' }}   # 이 시각 넘겨 대기 금지 (마감 09:00:00 전 여유)
        run: |
          to_sec() { echo $((10#${1%:*} * 3600 + 10#${1#*:} * 60)); }
          s=$(to_sec "$WINDOW_START")
          e=$(to_sec "$WINDOW_END")
          span=$((e - s))
          # 윈도우 내 랜덤 목표 시각(초). $RANDOM: 0~32767
          target=$((s + RANDOM % (span + 1)))
          midnight=$(TZ=Asia/Seoul date -d "today 00:00" +%s)
          now_sec=$(( $(date +%s) - midnight ))
          tgt=$(printf '%02d:%02d' $((target / 3600)) $(((target % 3600) / 60)))
          echo "윈도우 ${WINDOW_START}~${WINDOW_END} / 목표 ${tgt} / 현재 $(TZ=Asia/Seoul date +%H:%M:%S)"
          if [ "$now_sec" -lt "$target" ]; then
            wait=$((target - now_sec))
            echo "${wait}초 대기 후 실행..."
            sleep "$wait"
          elif [ "$now_sec" -le "$e" ]; then
            echo "목표 지났지만 마감(${WINDOW_END}) 이전 → 즉시 실행"
          else
            echo "::warning::GitHub 스케줄러 지연으로 마감(${WINDOW_END}) 초과! 즉시 실행하나 지각 위험"
          fi

      - name: 출결 체크 실행
        env:
          GW_URL: ${{ secrets.GW_URL }}
          GW_ID: ${{ secrets.GW_ID }}
          GW_PW: ${{ secrets.GW_PW }}
          # 연차 자동 스킵용 사원 번호 (Variables 또는 Secrets 로 등록). 없으면 연차 체크 생략.
          GW_EMP_SEQ: ${{ vars.GW_EMP_SEQ || secrets.GW_EMP_SEQ }}
          GW_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node attend.js

      - name: dry-run 디버그 스크린샷 업로드
        if: ${{ github.event.inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: attendance-debug
          path: attendance-debug.png
          if-no-files-found: ignore

      - name: 실패 시 스크린샷 업로드
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: attendance-error
          path: attendance-error.png
          if-no-files-found: ignore
