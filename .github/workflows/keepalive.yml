name: keepalive

# GitHub 은 60일간 커밋 활동이 없으면 스케줄 워크플로우를 자동 비활성화한다.
# 매월 1일 빈 커밋을 push 해서 활동을 갱신 → 출근 워크플로우가 계속 살아있게 유지.
on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 00:00 UTC
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 커밋 push 에 필요
    steps:
      - uses: actions/checkout@v4

      - name: 빈 커밋 push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "chore: keepalive (스케줄 유지)"
          git push
